<!DOCTYPE html> 
<html>
<head>
    <meta name="viewport" content="width=device-width,
    initial-scale=1.0">
    <link rel="stylesheet" href="Register.css">
    <title>Registro</title>
</head>

    <body>
    <nav class="barra-nav">
        <div class="logo">
            <img src="persona.png" alt="Logo">
            <span>Classify</span>
        </div>

        <ul>
            <li><a href="Login.html">Iniciar Sesión</a></li>
        </ul>

    </nav>

    <div class="container">
        <div class="register-box"> 
        <div class="register-logo">
        <img src="persona.png" alt="Persona">
        </div>
        <p class="titulo">Registrarse</p>
        <p class="subtitulo">Completa tus datos para registrarte</p>
        <div class="form-nombre-apellido">
            <div class="nombre-apellido">
                <input type="text" class="input-corto" placeholder="Tu nombre">
            </div>
            <div class="nombre-apellido">
                <input type="text" class="input-corto" placeholder="Tu apellido">
            </div>
        </div>
 
        <input type="email" class="input-largo" placeholder="Tu correo electrónico">
        <input type="password" class="input-largo" placeholder="Tu contraseña"> 
        <input type="password" class="input-largo" placeholder="Confirmar contraseña"> 

        <button> Crear cuenta </button>

        <p style="margin: 0">¿Ya tenes una cuenta? <a href="Login.html">Inicia sesión aquí</a></p>
        
    </div>
    <footer>
        Derechos reservados 2026 a Classify
    </footer>
</body> 
</html>
